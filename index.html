<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loldle - Classic Mode</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
</head>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="es">ES</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <h1 class="title">LoLdle</h1>
            <p class="subtitle" data-i18n="subtitle">MODO CLÁSICO</p>
        </div>

        <!-- Search Bar -->
        <div id="searchContainer" class="search-container">
            <div class="search-wrapper">
                <input
                    type="text"
                    id="searchInput"
                    data-i18n-placeholder="search"
                    placeholder="ESCRIBE UN CAMPEÓN..."
                    class="search-input"
                    autocomplete="off"
                />
            </div>
            
            <!-- Suggestions dropdown -->
            <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <!-- Column Headers -->
        <div id="columnHeaders" class="column-headers hidden">
            <div class="column-header" data-i18n="gender">GÉNERO</div>
            <div class="column-header" data-i18n="position">LÍNEA</div>
            <div class="column-header" data-i18n="species">CLASE</div>
            <div class="column-header" data-i18n="resource">RECURSO</div>
            <div class="column-header" data-i18n="range">TIPO</div>
            <div class="column-header" data-i18n="region">REGIÓN</div>
            <div class="column-header" data-i18n="release">AÑO</div>
        </div>

        <!-- Guesses Container -->
        <div id="guessesContainer" class="guesses-container"></div>

        <!-- Win State -->
        <div id="winState" class="win-state hidden">
            <div class="win-emoji">🏆</div>
            <h2 class="win-title" data-i18n="victory">¡VICTORIA!</h2>
            <p class="win-message" id="winMessage"></p>
            <p class="win-subtitle" data-i18n="comeback">VUELVE MAÑANA POR UN NUEVO DESAFÍO</p>
        </div>

        <!-- Stats -->
        <div class="stats">
    <div class="stat-card">
        <div class="stat-value amber" id="attemptsCount">0</div>
        <div class="stat-label" data-i18n="attempts">INTENTOS DEL DÍA</div>
    </div>
    <div class="stat-card">
        <div class="stat-value cyan" id="streakCount">0</div>
        <div class="stat-label" data-i18n="streak">RACHA</div>
    </div>
</div>

        const REGIONS = {
            demacia: { es: "Demacia", en: "Demacia" },
            noxus: { es: "Noxus", en: "Noxus" },
            ionia: { es: "Jonia", en: "Ionia" },
            zaun: { es: "Zaun", en: "Zaun" },
            piltover: { es: "Piltover", en: "Piltover" },
            freljord: { es: "Freljord", en: "Freljord" },
            shurima: { es: "Shurima", en: "Shurima" },
            runeterra: { es: "Runeterra", en: "Runeterra" },
            void: { es: "Vacío", en: "Void" },
            bilgewater: { es: "Bilgewater", en: "Bilgewater" },
            ixtal: { es: "Ixtal", en: "Ixtal" },
            "shadow-isles": { es: "Islas Sombrías", en: "Shadow Isles" },
            "mount-targon": { es: "Targon", en: "Targon" },
            "bandle-city": { es: "Bandle City", en: "Bandle City" }
        };

        // Game state
        let dailyChampion = null;
        let guesses = [];
        let gameWon = false;
        let selectedSuggestionIndex = -1;
        let filteredSuggestions = [];

        // DOM elements
        const searchInput = document.getElementById('searchInput');
        const suggestions = document.getElementById('suggestions');
        const guessesContainer = document.getElementById('guessesContainer');
        const winState = document.getElementById('winState');
        const winMessage = document.getElementById('winMessage');
        const attemptsCount = document.getElementById('attemptsCount');
        const winsCount = document.getElementById('winsCount');
        const columnHeaders = document.getElementById('columnHeaders');
        const searchContainer = document.getElementById('searchContainer');

        function getChampionIcon(iconKey) {
            return `${DDRAGON_CDN}${iconKey}.png`;
        }

        function initGame() {
            const today = new Date().toDateString();
            const stored = localStorage.getItem('loldle-daily-data');
            
            if (stored) {
                const data = JSON.parse(stored);
                if (data.date === today) {
                    dailyChampion = data.champion;
                    guesses = data.guesses || [];
                    gameWon = data.won || false;
                    
                    renderGuesses();
                    updateStats();
                    
                    if (gameWon) {
                        showWinState();
                    }
                    return;
                }
            }
            
            dailyChampion = CHAMPIONS_DATA[Math.floor(Math.random() * CHAMPIONS_DATA.length)];
            saveGame();
        }

        function saveGame() {
            const today = new Date().toDateString();
            localStorage.setItem('loldle-daily-data', JSON.stringify({
                date: today,
                champion: dailyChampion,
                guesses: guesses,
                won: gameWon
            }));
        }

        function compareChampions(guess, target) {
            const results = {};
            
            results.gender = {
                value: t(guess.gender),
                status: guess.gender === target.gender ? 'correct' : 'incorrect'
            };
            
            const guessLanes = guess.lane.split(',');
            const targetLanes = target.lane.split(',');
            const hasMatch = guessLanes.some(l => targetLanes.includes(l));
            results.lane = {
                value: guess.lane.split(',').map(l => l.toUpperCase()).join(' '),
                status: guess.lane === target.lane ? 'correct' : hasMatch ? 'partial' : 'incorrect'
            };
            
            const guessGenres = guess.genre.split(',');
            const targetGenres = target.genre.split(',');
            const genreMatch = guessGenres.some(g => targetGenres.includes(g));
            results.genre = {
                value: guess.genre.split(',')[0].toUpperCase(),
                status: guess.genre === target.genre ? 'correct' : genreMatch ? 'partial' : 'incorrect'
            };
            
            results.resource = {
                value: t(guess.resource),
                status: guess.resource === target.resource ? 'correct' : 'incorrect'
            };
            
            results.range = {
                value: guess.attackType === 'close' ? t('melee') : t('ranged'),
                status: guess.attackType === target.attackType ? 'correct' : 'incorrect'
            };
            
            results.region = {
                value: (REGIONS[guess.region]?.[currentLang] || guess.region).toUpperCase(),
                status: guess.region === target.region ? 'correct' : 'incorrect'
            };
            
            const yearDiff = target.releaseDate - guess.releaseDate;
            results.year = {
                value: guess.releaseDate.toString(),
                status: yearDiff === 0 ? 'correct' : 'partial',
                arrow: yearDiff === 0 ? null : yearDiff > 0 ? 'up' : 'down'
            };
            
            return results;
        }

        function createComparisonCell(value, status, arrow) {
    const cellClass = status === 'correct' ? 'cell-correct' :
                     status === 'partial' ? 'cell-partial' : 'cell-incorrect';

    // Texto descriptivo para año
    let yearHint = '';
    if (arrow === 'up') {
        yearHint = `<div class="year-hint">${currentLang === 'es' ? 'MÁS NUEVO' : 'NEWER'}</div>`;
    } else if (arrow === 'down') {
        yearHint = `<div class="year-hint">${currentLang === 'es' ? 'MÁS VIEJO' : 'OLDER'}</div>`;
    }

    const arrowIcon = arrow === 'up' ? '↑' : arrow === 'down' ? '↓' : '';

    return `
        <div class="cell ${cellClass}">
            <div class="cell-value">${value}</div>
            ${arrowIcon ? `<div class="cell-icon">${arrowIcon}</div>` : ''}
            ${yearHint}
        </div>
    `;
}

        function renderGuesses() {
            if (guesses.length > 0) {
                columnHeaders.classList.remove('hidden');
            }

                guessesContainer.innerHTML = [...guesses].reverse().map((guess) => {
                const comparison = compareChampions(guess.champion, dailyChampion);
                return `
                    <div class="guess-row">
                        <div class="guess-header">
                            <img src="${getChampionIcon(guess.champion.iconKey)}" 
                                 alt="${guess.champion.name}" 
                                 class="champion-icon"
                                 onerror="this.style.display='none'">
                            <div class="guess-name">
                                ${guess.champion.name.toUpperCase()}
                            </div>
                        </div>
                        <div class="guess-grid">
                            ${createComparisonCell(comparison.gender.value, comparison.gender.status)}
                            ${createComparisonCell(comparison.lane.value, comparison.lane.status)}
                            ${createComparisonCell(comparison.genre.value, comparison.genre.status)}
                            ${createComparisonCell(comparison.resource.value, comparison.resource.status)}
                            ${createComparisonCell(comparison.range.value, comparison.range.status)}
                            ${createComparisonCell(comparison.region.value, comparison.region.status)}
                            ${createComparisonCell(comparison.year.value, comparison.year.status, comparison.year.arrow)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
    attemptsCount.textContent = guesses.length;
    
    const stats = JSON.parse(localStorage.getItem('loldle-stats') || '{"streak":0}');
    document.getElementById('streakCount').textContent = stats.streak || 0;
}

        function showWinState() {
            searchContainer.classList.add('hidden');
            winState.classList.remove('hidden');
            const count = guesses.length;
            const word = count === 1 ? t('attempt') : t('attempts_plural');
            winMessage.textContent = t('guessedIn')
                .replace('{name}', dailyChampion.name.toUpperCase())
                .replace('{count}', count)
                .replace('{word}', word);
        }

        function handleGuess(champion) {
            if (gameWon) return;
            
            const comparison = compareChampions(champion, dailyChampion);
            guesses.push({ champion, comparison });
            
            const won = champion.id === dailyChampion.id;
            if (won) {
                gameWon = true;
                setTimeout(showWinState, 500);
            }
            
            saveGame();
            renderGuesses();
            updateStats();
            
            searchInput.value = '';
            suggestions.innerHTML = '';
            suggestions.classList.add('hidden');
            selectedSuggestionIndex = -1;
        }

        function updateSuggestionSelection() {
            const items = suggestions.querySelectorAll('.suggestion-item');
            items.forEach((item, idx) => {
                if (idx === selectedSuggestionIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function renderSuggestions(filtered) {
            if (filtered.length === 0) {
                suggestions.classList.add('hidden');
                return;
            }
            
            filteredSuggestions = filtered;
            selectedSuggestionIndex = -1;
            
            suggestions.innerHTML = filtered.map((champ, idx) => `
                <button 
                    class="suggestion-item"
                    data-index="${idx}">
                    <img src="${getChampionIcon(champ.iconKey)}" 
                         alt="${champ.name}" 
                         class="champion-icon"
                         onerror="this.style.display='none'">
                    <div class="suggestion-content">
                        <span class="suggestion-name">${champ.name.toUpperCase()}</span>
                        <span class="suggestion-lane">${champ.lane.toUpperCase()}</span>
                    </div>
                </button>
            `).join('');
            
            suggestions.classList.remove('hidden');
            
            suggestions.querySelectorAll('.suggestion-item').forEach((btn, idx) => {
                btn.addEventListener('click', () => handleGuess(filtered[idx]));
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            
            if (!term || gameWon) {
                suggestions.classList.add('hidden');
                return;
            }
            
            const alreadyGuessed = guesses.map(g => g.champion.id);
            const filtered = CHAMPIONS_DATA
                .filter(c => 
                    c.name.toLowerCase().includes(term) &&
                    !alreadyGuessed.includes(c.id)
                )
                .slice(0, 6);
            
            renderSuggestions(filtered);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (!filteredSuggestions.length) return;
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedSuggestionIndex = Math.min(selectedSuggestionIndex + 1, filteredSuggestions.length - 1);
                updateSuggestionSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedSuggestionIndex = Math.max(selectedSuggestionIndex - 1, -1);
                updateSuggestionSelection();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedSuggestionIndex >= 0 && selectedSuggestionIndex < filteredSuggestions.length) {
                    handleGuess(filteredSuggestions[selectedSuggestionIndex]);
                }
            } else if (e.key === 'Escape') {
                suggestions.classList.add('hidden');
                selectedSuggestionIndex = -1;
            }
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
                suggestions.classList.add('hidden');
                selectedSuggestionIndex = -1;
            }
        });

        initGame();
        updateLanguage();
    </script>
</body>
</html>
